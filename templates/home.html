<!DOCTYPE html>
<html>
<body>
    <div class="login">
        <h1>Student Exam Performance Indicator</h1>

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <label>Gender</label>
            <select name="gender" required>
                <option disabled selected>Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select><br><br>

            <label>Race/Ethnicity</label>
            <select name="race/ethnicity" required>
                <option disabled selected>Select</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select><br><br>

            <label>Parental Level of Education</label>
            <select name="parental level of education" required>
                <option disabled selected>Select</option>
                <option value="associate's degree">Associate</option>
                <option value="bachelor's degree">Bachelor</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select><br><br>

            <label>Lunch</label>
            <select name="lunch" required>
                <option disabled selected>Select</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select><br><br>

            <label>Test Preparation Course</label>
            <select name="test preparation course" required>
                <option disabled selected>Select</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select><br><br>

            <label>Reading Score</label>
            <input type="number" name="reading score" min="0" max="100" required><br><br>

            <label>Writing Score</label>
            <input type="number" name="writing score" min="0" max="100" required><br><br>

            <input type="submit" value="Predict">

        </form>

        <h2>Prediction: {{results}}</h2>
    </div>
</body>
</html>
